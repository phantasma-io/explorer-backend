name: CI

# Quality gate for the Rust explorer backend: format, lint, and tests.
#
# The crate compiles fully offline — only runtime `sqlx::query(...)` is used (no
# compile-time `query!` macros), so no DATABASE_URL or `.sqlx` cache is needed to
# build or to run the pure (non-DB) tests.
#
# The db-integration tests in `crates/db` self-skip when EXPLORER_TEST_DATABASE_URL
# is unset (convenient locally). To stop them silently passing-on-skip here, CI
# runs them against a Postgres service: the schema is loaded from ci/test-schema.sql
# (a `pg_dump --schema-only` of the renamed Rust schema — regenerate when the schema
# changes) plus ci/test-seed.sql (reference rows: chains, transaction_states,
# signature_kinds, event_kinds). EXPLORER_REQUIRE_DB_TESTS=1 makes the CI-guard test
# fail if the test DB URL is ever missing, so the DB tests cannot quietly skip.
# One test that needs a full data fixture (not just schema+seed) is gated
# behind EXPLORER_TEST_FULL_BASELINE and runs locally/nightly, not here.

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: explorer_rs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/explorer_rs_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.91, matching the MSRV and Docker images)
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Load test schema and reference seed
        env:
          PGPASSWORD: postgres
        run: |
          command -v psql >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y postgresql-client)
          psql "$TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f ci/test-schema.sql
          psql "$TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f ci/test-seed.sql

      - name: Tests
        env:
          EXPLORER_TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          EXPLORER_REQUIRE_DB_TESTS: "1"
        run: cargo test --workspace
