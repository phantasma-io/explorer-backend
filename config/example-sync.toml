# Example configuration for the explorer-worker (sync) service.
#
# Copy this file to config/local-sync.toml (gitignored) and adjust the values for
# your environment, or point the service at it with EXPLORER_CONFIG_FILE.
# Every value below can also be overridden by the matching EXPLORER_* environment
# variable (env takes precedence over the file).

[database]
# EXPLORER_DATABASE_URL — the worker writes here; point it at the database you
# intend to write to.
url = "postgres://postgres@localhost/explorer"
max_connections = 16
acquire_timeout_seconds = 30

[rpc]
# EXPLORER_RPC_ENDPOINTS — one or more node JSON-RPC URLs (round-robin).
endpoints = ["http://localhost:5172/rpc"]
# EXPLORER_RPC_TIMEOUT_SECONDS
timeout_seconds = 30
# EXPLORER_RPC_MAX_RESPONSE_BYTES (256 MiB)
max_response_bytes = 268435456
# EXPLORER_RPC_API_KEY — optional API key sent as the `X-Api-Key` header on every
# RPC request. Set it when the node enforces per-key rate-limit tiers (it maps the
# worker to that key's tier); leave unset for an anonymous client.
# api_key = "your-node-api-key"

[chain]
nexus = "mainnet"
chain = "main"

[worker]
# sync_mode: "normal" runs the fetch/process pipeline (RPC fetch overlaps DB
# writes; the cursor still advances in strict height order) — the production
# default. "sequential" projects one block at a time for deterministic
# parity/debug runs. "relief" forces one-block fetch/project passes for
# difficult, RPC-heavy ranges.
sync_mode = "normal"
# Max blocks projected per sync pass. Larger amortizes the pipeline's per-pass
# fill/drain over the catch-up; near the tip the pass is naturally small.
fetch_batch_size = 1000
# Concurrent in-flight block fetches (the C# backend uses 6). Raise to hide
# remote-RPC latency, but stay within what the node tolerates.
fetch_concurrency = 6
poll_seconds = 1
# Max blocks fetched ahead of the writer (backpressure + jitter buffer); bounds
# how many decoded blocks sit in memory. The C# backend uses a 500-deep channel.
queue_capacity = 500
# Deprecated/no-op: projection is single-writer (strict ordering), so it is never
# parallel; in-flight fetch concurrency is `fetch_concurrency`. Kept for compat.
project_concurrency = 6
# Optional throttling for heavy chain sections (milliseconds).
inter_block_delay_ms = 0
batch_delay_ms = 0

[logging]
console = true
file = "logs/sync-worker.log"
