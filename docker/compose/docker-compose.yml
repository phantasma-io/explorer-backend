services:
  api:
    image: explorer-backend-rust-api-${DEPLOY_ENV:-local}
    container_name: explorer-backend-rust-api-${DEPLOY_ENV:-local}
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile
    env_file:
      - ../../.env
    ports:
      - "${API_PORT:-9000}:9000"
    networks:
      - api
      - postgresql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 20m

  worker:
    image: explorer-backend-rust-worker-${DEPLOY_ENV:-local}
    container_name: explorer-backend-rust-worker-${DEPLOY_ENV:-local}
    build:
      context: ../..
      dockerfile: docker/worker/Dockerfile
    env_file:
      - ../../.env
    networks:
      - worker
      - postgresql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 20m

networks:
  api:
    name: api-${DEPLOY_ENV:-local}-network
  worker:
    name: worker-${DEPLOY_ENV:-local}-network
  postgresql:
    name: postgresql-network
    external: true
